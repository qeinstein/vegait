services:
  # ============================================================
  # Core Infrastructure
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: rl-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ratelimiter
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: rl-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ============================================================
  # Mock Third-Party API
  # ============================================================
  mock-api:
    build:
      context: ./mock-api
      dockerfile: Dockerfile
    container_name: rl-mock-api
    environment:
      MOCK_PORT: "9090"
    ports:
      - "9090:9090"

  # ============================================================
  # Rate Limiter Gateway — CLUSTER (two stateless instances)
  #
  # Both instances are identical and share the same Redis + PostgreSQL, so a
  # rate-limit check is accurate no matter which instance serves the request.
  # They are NOT published on host ports directly — traffic goes through the
  # nginx load balancer below. Each instance stamps X-Gateway-Instance on every
  # response so you can see the cluster in action.
  # ============================================================
  rate-limiter-1: &gateway
    build:
      context: .
      dockerfile: Dockerfile
    image: vegait-gateway:latest
    container_name: rl-gateway-1
    environment: &gateway-env
      SERVER_PORT: "8080"
      ADMIN_PORT: "8081"
      INSTANCE_ID: "gateway-1"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ratelimiter
      REDIS_ADDR: "redis:6379"
      MOCK_API_URL: "http://mock-api:9090"
      LOG_BUFFER_SIZE: "10000"
      LOG_FLUSH_INTERVAL_MS: "2000"
      LOG_BATCH_SIZE: "500"
      LOG_WORKER_COUNT: "4"
    expose:
      - "8080"
      - "8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mock-api:
        condition: service_started

  rate-limiter-2:
    <<: *gateway
    container_name: rl-gateway-2
    environment:
      <<: *gateway-env
      INSTANCE_ID: "gateway-2"

  # ============================================================
  # Load Balancer — the single public entry point
  # ============================================================
  gateway-lb:
    image: nginx:1.27-alpine
    container_name: rl-lb
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:8080"   # Gateway proxy endpoint
      - "8081:8081"   # Admin API + dashboard
    depends_on:
      - rate-limiter-1
      - rate-limiter-2

volumes:
  pg_data:
