# Load balancer in front of the rate-limiter gateway cluster.
# Round-robins across the two stateless gateway instances. Rate-limit accuracy
# does NOT depend on which instance a request lands on — all instances share the
# same atomic Redis sliding-window state.

worker_processes auto;
events { worker_connections 2048; }

http {
    access_log off;

    # Proxy port (public API traffic) — round-robin across both gateways.
    upstream gateway_proxy {
        server rate-limiter-1:8080;
        server rate-limiter-2:8080;
        keepalive 64;
    }

    # Admin API + dashboard — round-robin across both gateways.
    upstream gateway_admin {
        server rate-limiter-1:8081;
        server rate-limiter-2:8081;
        keepalive 64;
    }

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header Connection        "";
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    server {
        listen 8080;
        location / {
            proxy_pass http://gateway_proxy;
        }
    }

    server {
        listen 8081;
        location / {
            proxy_pass http://gateway_admin;
        }
    }
}
